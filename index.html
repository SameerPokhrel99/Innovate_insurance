<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Insurance Vault | Innovate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(30, 41, 59, 0.5) 100%); }
    </style>
</head>
<body x-data="insuranceVault()" x-init="init()">

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#0f172a]">
        <div class="glass p-12 rounded-[3rem] w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-blue-500/20">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase mb-2">Admin Vault</h1>
            <p class="text-slate-400 text-sm mb-8 font-semibold">Authorized Personnel Access Only</p>
            <div class="space-y-4">
                <input type="email" x-model="loginEmail" placeholder="Email" class="w-full input-field p-5 rounded-2xl font-bold">
                <input type="password" x-model="loginPassword" placeholder="Password" class="w-full input-field p-5 rounded-2xl font-bold">
                <button @click="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black transition-all shadow-lg shadow-blue-600/20">UNLOCK SYSTEM</button>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="p-6 md:p-12 lg:p-20 max-w-[1600px] mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
            <div>
                <h1 class="text-5xl font-black tracking-tighter uppercase italic bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-500">
                    Insurance Analytics
                </h1>
                <p class="text-blue-400 font-bold text-xs uppercase tracking-[0.3em] mt-2">Executive Financial Overview</p>
            </div>
            <div class="flex items-center gap-4">
                <button @click="openModal()" class="bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-2xl font-black text-sm transition-all shadow-xl shadow-blue-600/20">＋ NEW CLAIM</button>
                <button @click="logout()" class="p-5 bg-white/5 hover:bg-rose-500/10 rounded-2xl group transition-all">
                    <svg class="w-6 h-6 text-slate-400 group-hover:text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="glass stat-card p-10 rounded-[2.5rem]">
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Total Value Claimed</p>
                <h2 class="text-4xl font-black" x-text="'Rs. ' + totalClaimed().toLocaleString()"></h2>
            </div>
            <div class="glass stat-card p-10 rounded-[2.5rem] border-blue-500/20">
                <p class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4">Amount Disbursed</p>
                <h2 class="text-4xl font-black text-blue-50" x-text="'Rs. ' + totalSettled().toLocaleString()"></h2>
            </div>
            <div class="glass stat-card p-10 rounded-[2.5rem] border-rose-500/20">
                <p class="text-xs font-black text-rose-400 uppercase tracking-widest mb-4">Net Outstanding</p>
                <h2 class="text-4xl font-black text-rose-50" x-text="'Rs. ' + (totalClaimed() - totalSettled()).toLocaleString()"></h2>
            </div>
        </div>

        <div class="glass rounded-[3rem] overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <th class="px-10 py-8">Claimant Details</th>
                        <th class="px-10 py-8 text-right">Financials</th>
                        <th class="px-10 py-8 text-center">Aging Status</th>
                        <th class="px-10 py-8 text-right">Settlement</th>
                        <th class="px-10 py-8 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in claims" :key="item.id">
                        <tr class="hover:bg-white/[0.02] transition-all group">
                            <td class="px-10 py-8">
                                <p class="text-xl font-extrabold uppercase tracking-tight group-hover:text-blue-400 transition-colors" x-text="item.name"></p>
                                <p class="text-[10px] font-bold text-slate-500 mt-1" x-text="'Filed: ' + item.softDate"></p>
                            </td>
                            <td class="px-10 py-8 text-right">
                                <p class="text-lg font-black" x-text="'Rs. ' + Number(item.amountClaimed).toLocaleString()"></p>
                                <p class="text-[10px] font-bold text-slate-500 uppercase" x-text="'Tax: ' + (item.taxAmount || 0) + ' | SC: ' + (item.serviceCharge || 0)"></p>
                            </td>
                            <td class="px-10 py-8 text-center">
                                <div class="inline-flex flex-col items-center">
                                    <span class="text-lg font-black" :class="getAgingColor(item)" x-text="calculateDays(item) + ' Days'"></span>
                                    <span class="text-[9px] font-black uppercase text-slate-600">Active Pipeline</span>
                                </div>
                            </td>
                            <td class="px-10 py-8 text-right">
                                <template x-if="item.amountDeposited > 0">
                                    <div>
                                        <p class="text-lg font-black text-emerald-400" x-text="'Rs. ' + Number(item.amountDeposited).toLocaleString()"></p>
                                        <p class="text-[10px] font-bold text-slate-500 uppercase" x-text="'Paid ' + item.depositDate"></p>
                                    </div>
                                </template>
                                <template x-if="!item.amountDeposited">
                                    <span class="px-4 py-2 bg-amber-500/10 text-amber-500 text-[10px] font-black rounded-lg border border-amber-500/20 uppercase">Pending</span>
                                </template>
                            </td>
                            <td class="px-10 py-8 text-right space-x-2">
                                <button @click="editClaim(item)" class="p-3 hover:bg-blue-500/10 rounded-xl text-blue-400 transition-all">Edit</button>
                                <button @click="deleteClaim(item.id)" class="p-3 hover:bg-rose-500/10 rounded-xl text-rose-500 transition-all">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="showForm" x-cloak class="fixed inset-0 z-[1100] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-md">
        <div class="glass w-full max-w-2xl rounded-[3.5rem] p-12 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-3xl font-black uppercase tracking-tighter" x-text="isEditing ? 'Update Records' : 'Initialize Claim'"></h3>
                <button @click="showForm = false" class="text-slate-500 hover:text-white font-bold uppercase text-xs">Close</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Claimant Full Name</label>
                    <input type="text" x-model="form.name" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Submission Date</label>
                    <input type="date" x-model="form.softDate" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Gross Claim Amount</label>
                    <input type="number" x-model="form.amountClaimed" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold">
                </div>
                
                <div class="md:col-span-2 pt-6 border-t border-white/5 mt-4">
                    <p class="text-[11px] font-black text-blue-400 uppercase mb-6 tracking-widest">Deductions & Settlement</p>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Service Charge</label>
                            <input type="number" x-model="form.serviceCharge" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Tax / TDS</label>
                            <input type="number" x-model="form.taxAmount" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-emerald-400 uppercase ml-2">Net Deposited</label>
                            <input type="number" x-model="form.amountDeposited" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold border-emerald-500/20 bg-emerald-500/5">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Disbursement Date</label>
                            <input type="date" x-model="form.depositDate" class="w-full input-field p-5 rounded-[1.5rem] mt-2 font-bold">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-12 flex gap-4">
                <button @click="saveClaim()" class="flex-1 bg-blue-600 text-white p-6 rounded-[1.5rem] font-black text-sm uppercase shadow-lg shadow-blue-600/20 transition-all hover:scale-[1.02]">Save Financial Record</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ", authDomain: "insurancetracker-69b69.firebaseapp.com", databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com", projectId: "insurancetracker-69b69", storageBucket: "insurancetracker-69b69.firebasestorage.app", messagingSenderId: "419918361385", appId: "1:419918361385:web:01ec2d6b32b0df6988fd38" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function insuranceVault() {
            return {
                isLoggedIn: false, currentUserEmail: '', superAdmin: 'sameer.pokharel@innovatetech.co',
                loginEmail: '', loginPassword: '', showForm: false, isEditing: false, claims: [],
                form: { id: null, name: '', softDate: '', amountClaimed: 0, amountDeposited: 0, depositDate: '', serviceCharge: 0, taxAmount: 0 },
                
                init() {
                    firebase.auth().onAuthStateChanged(user => {
                        if (user && user.email === this.superAdmin) {
                            this.isLoggedIn = true;
                            this.currentUserEmail = user.email;
                            this.loadData();
                        } else { this.isLoggedIn = false; }
                    });
                },
                login() {
                    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION).then(() => {
                        return firebase.auth().signInWithEmailAndPassword(this.loginEmail, this.loginPassword);
                    }).then(() => window.location.reload());
                },
                logout() { firebase.auth().signOut().then(() => window.location.reload()); },
                loadData() {
                    db.ref('insurance_private').on('value', snap => {
                        const d = snap.val();
                        this.claims = d ? Object.values(d).reverse() : [];
                    });
                },
                totalClaimed() { return this.claims.reduce((a, b) => a + Number(b.amountClaimed || 0), 0); },
                totalSettled() { return this.claims.reduce((a, b) => a + Number(b.amountDeposited || 0), 0); },
                calculateDays(item) {
                    const start = new Date(item.softDate);
                    const end = item.depositDate ? new Date(item.depositDate) : new Date();
                    const diff = Math.floor((end - start) / (1000 * 60 * 60 * 24));
                    return diff > 0 ? diff : 0;
                },
                getAgingColor(item) {
                    if (item.amountDeposited > 0) return 'text-emerald-500';
                    const days = this.calculateDays(item);
                    if (days > 30) return 'text-rose-500';
                    if (days > 15) return 'text-amber-500';
                    return 'text-white';
                },
                saveClaim() {
                    const id = this.form.id || Date.now();
                    db.ref('insurance_private/' + id).set({ ...this.form, id: id });
                    this.showForm = false;
                },
                deleteClaim(id) { if(confirm('Permanently Delete Record?')) db.ref('insurance_private/' + id).remove(); },
                openModal() {
                    this.isEditing = false;
                    this.form = { id: null, name: '', softDate: new Date().toISOString().split('T')[0], amountClaimed: 0, amountDeposited: 0, depositDate: '', serviceCharge: 0, taxAmount: 0 };
                    this.showForm = true;
                },
                editClaim(item) {
                    this.isEditing = true;
                    this.form = { ...item };
                    this.showForm = true;
                }
            }
        }
    </script>
</body>
</html>
