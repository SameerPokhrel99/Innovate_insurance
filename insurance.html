<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Delay Tracker | Innovate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        .accent-cream { background-color: #f5f2eb; }
        /* Red highlight for delays over 15 days */
        .aging-danger { color: #dc2626; background-color: #fef2f2; border: 1px solid #fee2e2; }
        .aging-normal { color: #92400e; background-color: #fffbeb; border: 1px solid #fef3c7; }
        .aging-final { color: #065f46; background-color: #ecfdf5; border: 1px solid #d1fae5; }
    </style>
</head>
<body class="text-slate-800" x-data="insuranceSystem()" x-init="init()">

    <header class="max-w-7xl mx-auto px-6 pt-12 pb-8 flex flex-col md:flex-row justify-between items-end border-b border-slate-200">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Claim Aging Monitor</h1>
            <p class="text-slate-500 font-medium mt-1 uppercase text-xs tracking-widest">Efficiency Tracking | Operations Dept</p>
        </div>
        <div class="text-right mt-4 md:mt-0">
            <p class="text-sm font-bold text-slate-800">Sameer Pokhrel</p>
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Operations Lead</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 rounded-3xl border border-slate-200 accent-cream">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">In-Progress Claims</p>
                <p class="text-4xl font-black text-slate-800" x-text="claims.filter(c => !c.depositDate).length"></p>
            </div>
            <div class="p-6 rounded-3xl border border-red-100 bg-red-50">
                <p class="text-[10px] font-black text-red-400 uppercase tracking-widest">High Delay (>15 Days)</p>
                <p class="text-4xl font-black text-red-600" x-text="countDelays()"></p>
            </div>
            <button @click="showForm = !showForm" class="bg-slate-900 text-white rounded-3xl font-bold hover:bg-black transition-all shadow-xl flex items-center justify-center gap-2">
                <span x-text="showForm ? '✕ Close Form' : '＋ Log New Claim Entry'"></span>
            </button>
        </div>

        <div x-show="showForm" x-transition.opacity class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl p-10" @click.away="showForm = false">
                <h3 class="text-2xl font-bold text-slate-900 mb-8 tracking-tight">Claim Detail Entry</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Employee Name</label>
                        <input type="text" x-model="form.name" class="w-full bg-slate-50 border-slate-200 border p-4 rounded-2xl mt-1 outline-none font-medium">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Softcopy Date (Process Start)</label>
                        <input type="date" x-model="form.softDate" class="w-full bg-slate-50 border-slate-200 border p-4 rounded-2xl mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Hardcopy Pickup Date</label>
                        <input type="date" x-model="form.hardDate" class="w-full bg-slate-50 border-slate-200 border p-4 rounded-2xl mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Amount (NPR)</label>
                        <input type="number" x-model="form.amount" class="w-full bg-slate-50 border-slate-200 border p-4 rounded-2xl mt-1 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Deposit Date (Closing Date)</label>
                        <input type="date" x-model="form.depositDate" class="w-full bg-slate-50 border-slate-200 border p-4 rounded-2xl mt-1">
                    </div>
                </div>
                <div class="flex gap-4 pt-10">
                    <button @click="saveClaim()" class="flex-1 bg-slate-900 text-white p-5 rounded-2xl font-bold hover:scale-[1.02] transition-all">Record Claim</button>
                    <button @click="resetForm()" class="px-8 text-slate-400 font-bold hover:text-slate-600">Cancel</button>
                </div>
            </div>
        </div>

        <div class="cream-card rounded-[2.5rem] overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead>
                    <tr class="accent-cream border-b border-slate-200">
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Employee</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Timeline</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-center">Aging Days</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Settings</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <template x-for="(item, index) in claims" :key="item.id">
                        <tr class="hover:bg-slate-50/50 transition-all group">
                            <td class="px-8 py-6">
                                <p class="font-bold text-slate-800 text-lg" x-text="item.name"></p>
                                <p class="text-[10px] font-black text-emerald-600 uppercase" x-text="'Rs. ' + (item.amount || '0')"></p>
                            </td>
                            <td class="px-8 py-6">
                                <div class="text-xs space-y-1">
                                    <p class="text-slate-500 font-medium">Softcopy: <span class="text-slate-800" x-text="item.softDate"></span></p>
                                    <p class="text-slate-500 font-medium">Hardcopy: <span class="text-slate-800" x-text="item.hardDate || 'Pending'"></span></p>
                                    <p class="font-bold uppercase tracking-tighter" :class="item.depositDate ? 'text-emerald-600' : 'text-amber-500'" 
                                       x-text="item.depositDate ? 'Deposited: ' + item.depositDate : 'Status: Processing'"></p>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <div class="inline-block px-5 py-2 rounded-2xl font-black text-xl" 
                                     :class="getAgingClass(item)"
                                     x-text="calculateAging(item)">
                                </div>
                                <p class="text-[8px] font-bold text-slate-400 uppercase mt-2 tracking-widest" x-text="item.depositDate ? 'Total Days' : 'Days Elapsed'"></p>
                            </td>
                            <td class="px-8 py-6 text-right space-x-4">
                                <button @click="deleteClaim(item.id)" class="text-slate-300 hover:text-red-500 font-bold text-[10px] uppercase tracking-widest transition-colors">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function insuranceSystem() {
            return {
                showForm: false,
                claims: [],
                form: { id: null, name: '', softDate: '', hardDate: '', amount: '', depositDate: '' },
                
                init() {
                    const saved = localStorage.getItem('it-aging-v1');
                    this.claims = saved ? JSON.parse(saved) : [];
                },

                calculateAging(item) {
                    if (!item.softDate) return 0;
                    const start = new Date(item.softDate);
                    const end = item.depositDate ? new Date(item.depositDate) : new Date();
                    const diff = Math.floor((end - start) / (1000 * 60 * 60 * 24));
                    return diff > 0 ? diff : 0;
                },

                getAgingClass(item) {
                    const days = this.calculateAging(item);
                    if (item.depositDate) return 'aging-final';
                    if (days > 15) return 'aging-danger';
                    return 'aging-normal';
                },

                countDelays() {
                    return this.claims.filter(c => !c.depositDate && this.calculateAging(c) > 15).length;
                },

                saveClaim() {
                    if (!this.form.name || !this.form.softDate) return alert('Name and Softcopy date are required');
                    this.claims.unshift({ ...this.form, id: Date.now() });
                    this.persist();
                    this.resetForm();
                },

                deleteClaim(id) {
                    if (confirm('Delete this record?')) {
                        this.claims = this.claims.filter(c => c.id !== id);
                        this.persist();
                    }
                },

                persist() { localStorage.setItem('it-aging-v1', JSON.stringify(this.claims)); },
                resetForm() {
                    this.form = { id: null, name: '', softDate: '', hardDate: '', amount: '', depositDate: '' };
                    this.showForm = false;
                }
            }
        }
    </script>
</body>
</html>
